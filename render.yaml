services:
  # --- Backend API ---
  - type: web
    name: splitease-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: cd backend && chmod +x build.sh && ./build.sh
    startCommand: cd backend && gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: splitease-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CORS_ORIGINS
        fromService:
          type: pserv
          name: splitease-web
          property: host
          # After deploy, manually set this to: https://splitease-web.onrender.com

  # --- Frontend Static Site ---
  - type: web
    name: splitease-web
    runtime: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: pserv
          name: splitease-api
          property: host
          # Will resolve to: https://splitease-api.onrender.com/api
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: splitease-db
    plan: free
    region: oregon
